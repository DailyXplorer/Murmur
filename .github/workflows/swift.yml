name: Swift

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: ./script/test.sh

      - name: Verify staged app
        run: MURMUR_PORTABLE_SMOKE=1 ./script/build_and_run.sh --verify

      - name: Validate local archives
        run: MURMUR_PORTABLE_SMOKE=1 ./script/build_and_run.sh --release-readiness
